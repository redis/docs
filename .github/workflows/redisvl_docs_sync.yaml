name: redisvl_docs_sync

on:
  schedule:
    - cron: '0 0 * * *' # run every day at midnight UTC time
  workflow_dispatch: # or run on manual trigger

jobs:
  define-version-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLDEST_SUPPORTED_VERSION="0.6.0"
          versions=$(gh release -R redis/redis-vl-python list --json name,isLatest \
            | jq -r '.[] | [.name, .isLatest] | @tsv' \
            | sed "/${OLDEST_SUPPORTED_VERSION}/q" \
            | jq -Rnc '{include: [inputs | split("\t") | {version: .[0], isLatest: .[1]}]}')

          echo "${versions}"
          echo "matrix=${versions}" >> "$GITHUB_OUTPUT"

  redisvl_docs_sync:
    runs-on: ubuntu-latest
    needs: define-version-matrix
    strategy:
      matrix: ${{ fromJSON(needs['define-version-matrix'].outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v3'

      - name: 'Install deps'
        run: |
          pip3 install sphinx sphinx_design sphinx_copybutton nbsphinx==0.9.7 sphinx_favicon myst_nb sphinx_markdown_builder==0.6.8 jupyter

      - name: 'Fetch redisvl repo'
        run: |
          git clone https://github.com/redis/redis-vl-python

      - name: 'Run sphinx-build'
        id: 'sphinx'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ matrix.version }}"
          version="${version#v}"
          isLatest="${{ matrix.isLatest }}"

          pushd redis-vl-python
          git checkout "tags/${version}" || git checkout "tags/v${version}"
          pip3 install -e .
          popd

          # Strip empty markdown cells (e.g. bare "##") that crash sphinx_markdown_builder
          find redis-vl-python/docs -name '*.ipynb' | while read -r nb; do
            tmp=$(mktemp)
            jq '.cells |= map(select(.cell_type != "markdown" or ((.source | if type == "array" then join("") else . end) | test("^\\s*#+\\s*$") | not)))' "$nb" > "$tmp" && mv "$tmp" "$nb"
          done

          if [ ${isLatest} = true ]; then
            sphinx-build -M markdown ./redis-vl-python/docs ./build-latest
          else
            sphinx-build -M markdown ./redis-vl-python/docs ./build-${version}
          fi

      - name: 'Format markdown files for hugo compatibility'
        run: |
          version="${{ matrix.version }}"
          version="${version#v}"
          isLatest="${{ matrix.isLatest }}"

          #!/bin/bash
          mkdir -p redis_vl_hugo/user_guide/
          mkdir redis_vl_hugo/api/
          if [ -d "./redis-vl-python/docs/overview" ]; then
              mkdir redis_vl_hugo/overview/
          fi
          if [ -d "./redis-vl-python/docs/concepts" ]; then
              mkdir redis_vl_hugo/concepts/
          fi

          function format() {
              src=$1

              # Extract title from source file
              title=$(head -n 1 ${src} | sed 's/# //')
              linkTitle="${title}"

              # All words except first should be lowercased in linkTitle, except for RedisVL, API, CLI, LLMs, JSON
              if [[ "$linkTitle" =~ \  ]]; then
                  linkTitle=$(awk '{ $1=$1; for (i=2; i<=NF; i++) if ($i != "RedisVL" && $i != "API" && $i != "CLI" && $i != "LLMs" && $i != "JSON") $i=tolower($i); print }' <<< "${linkTitle}")
              fi

              # Get alias
              alias=$(echo ${src} | sed -E 's|./redis_vl_hugo/|/integrate/redisvl/| ; s|\.md$|| ; s|\/_index$||')

              # Inject frontmatter in destination file
              if [ ${isLatest} = true ]; then
              cat >_tmp <<EOL
          ---
          linkTitle: ${linkTitle}
          title: ${title}
          aliases:
          - ${alias}
          EOL
              else
              cat >_tmp <<EOL
          ---
          linkTitle: ${linkTitle}
          title: ${title}
          EOL
              fi


              # Compute weight: filename-based prefix first, then override via title for top-level pages
              weight=""
              f=$(basename "${src}")
              if [[ "$f" =~ ^([0-9][0-9])_(.+) ]]; then
                  weight="${BASH_REMATCH[1]}"
              fi
              case "${title}" in
                  "Overview") weight=3 ;;
                  "Concepts") weight=3 ;;
                  "User Guides") weight=4 ;;
                  "Guides") weight=4 ;;
                  "RedisVL API") weight=5 ;;
                  "Installation") weight=1 ;;
                  "Getting Started") weight=2 ;;
                  "How-To Guides") weight=3 ;;
                  "The RedisVL CLI") weight=4 ;;
                  "Use Cases") weight=5 ;;
              esac
              if [ -n "${weight}" ]; then
                  echo "weight: ${weight}" >> _tmp
              fi

              # For _index.md files, add hideListLinks property
              if [[ ${src} =~ _index.md$ ]]; then
                  echo "hideListLinks: true" >> _tmp
              fi

              # Close frontmatter
              echo "---" >> _tmp
              echo "" >> _tmp

              # Write all of source file, except first line, in destination file
              tail -n+2 ${src} >> _tmp

              # _index.md files need title removed
              if [[ ${src} =~ _index.md$ ]]; then
                  sed -i "s/# ${title}//" _tmp
              fi

              mv _tmp ${src}
          }

          # Convert jupyter notebooks to markdown
          build_folder=$(echo build-*)
          jupyter nbconvert --to markdown ${build_folder}/jupyter_execute/user_guide/*.ipynb --output-dir redis_vl_hugo/user_guide/ 2>/dev/null
          if [ -f "${build_folder}/jupyter_execute/overview/cli.ipynb" ]; then
              jupyter nbconvert --to markdown ${build_folder}/jupyter_execute/overview/cli.ipynb --output-dir redis_vl_hugo/overview/ 2>/dev/null
          fi

          # Prepare markdown files
          rsync -a ./${build_folder}/markdown/api/ ./redis_vl_hugo/api/ --exclude=index.md
          if [ -f "./${build_folder}/markdown/overview/installation.md" ]; then
              cp ./${build_folder}/markdown/overview/installation.md ./redis_vl_hugo/overview/installation.md
          fi
          if [ -f "./${build_folder}/markdown/user_guide/installation.md" ]; then
              cp ./${build_folder}/markdown/user_guide/installation.md ./redis_vl_hugo/user_guide/installation.md
          fi
          if [ -d "./${build_folder}/markdown/concepts" ]; then
              rsync -a ./${build_folder}/markdown/concepts/ ./redis_vl_hugo/concepts/ --exclude=index.md
          fi

          # Copy how_to_guides markdown files if they exist
          if [ -d "./${build_folder}/markdown/user_guide/how_to_guides" ]; then
              mkdir -p redis_vl_hugo/user_guide/how_to_guides/
              rsync -a ./${build_folder}/markdown/user_guide/how_to_guides/ ./redis_vl_hugo/user_guide/how_to_guides/ --exclude=index.md
          fi

          # Copy use_cases markdown files if they exist
          if [ -d "./${build_folder}/markdown/user_guide/use_cases" ]; then
              mkdir -p redis_vl_hugo/user_guide/use_cases/
              rsync -a ./${build_folder}/markdown/user_guide/use_cases/ ./redis_vl_hugo/user_guide/use_cases/ --exclude=index.md
          fi

          # Move numbered user-guide pages (except 01_getting_started) into how_to_guides/
          mkdir -p redis_vl_hugo/user_guide/how_to_guides/
          moved_slugs_alt=""
          for f in ./redis_vl_hugo/user_guide/[0-9][0-9]_*.md; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if [[ "$base" != 01_getting_started.md ]]; then
                  moved="./redis_vl_hugo/user_guide/how_to_guides/${base}"
                  mv "$f" "${moved}"
                  # File moved one level deeper: bump '../' to '../../' in markdown links
                  sed -E -i 's#\]\(\.\./#](../../#g' "${moved}"
                  # Track moved slug (numeric prefix stripped) for later relref rewrites
                  slug="${base%.md}"
                  slug="${slug#[0-9][0-9]_}"
                  moved_slugs_alt="${moved_slugs_alt:+${moved_slugs_alt}|}${slug}"
              fi
          done

          # Format markdown files
          shopt -s globstar
          markdown_pages=(./redis_vl_hugo/**/*.md)

          for markdown_page in "${markdown_pages[@]}"; do
              format "${markdown_page}"

              # Remove blockquotes and ansi stuff
              sed -E -i 's/^> *//g; s/\x1b\[[0-9;]*m//g' "${markdown_page}"

              # Replace https://docs.redisvl.com links
              sed -E -i 's#https://docs.redisvl.com/en/latest/.+/([^_]+).+\.html(\#[^)]+)#{{< relref "\1\2" >}}#g; s#https://docs.redisvl.com/en/latest/(.+)\.html#https://redis.io/docs/latest/develop/ai/redisvl/\1#g' "${markdown_page}"

              # Replace .md, .ipynb and .rst links with relrefs, stripping numeric prefixes like 01_, 02_, etc.
              sed -E -i 's#\]\(([^)]*/)([0-9]+_)?([^/)]+)\.(md|ipynb|rst)\)#]({{< relref "\1\3" >}})#g' "${markdown_page}"

              # Replace .md, .ipynb and .rst links without paths (same directory)
              sed -E -i 's#\]\(([0-9]+_)?([^/)]+)\.(md|ipynb|rst)\)#]({{< relref "\2" >}})#g' "${markdown_page}"

              # Bump relrefs to user_guide/<slug> -> user_guide/how_to_guides/<slug> for moved slugs
              if [ -n "${moved_slugs_alt}" ]; then
                  sed -E -i "s#relref \"((\\.\\./)*user_guide)/(${moved_slugs_alt})\"#relref \"\\1/how_to_guides/\\3\"#g" "${markdown_page}"
              fi

              # Fix image paths from _static/ to proper Hugo path
              sed -E -i 's#!\[([^]]*)\]\(_static/([^)]+)\)#{{< image filename="/images/redisvl/\2" alt="\1" >}}#g' "${markdown_page}"
          done

          # Fix links in api pages
          api_markdown_pages=(./redis_vl_hugo/api/*.md)

          for api_markdown_page in "${api_markdown_pages[@]}"; do
              gawk '
                  # handle relrefs to other pages
                  /\([A-Za-z]+\.md#redisvl\.[a-zA-Z0-9_.]+\)/ {
                      while (match($0, /\([A-Za-z]+\.md#redisvl\.[a-zA-Z0-9_.]+\)/)) {
                          
                          m = substr($0, RSTART+1, RLENGTH-2)
                          split(m, parts, /[.#]/)
                          ref = "({{< relref \"" parts[1] "/#" tolower(parts[length(parts)]) "\" >}})"
                          $0 = substr($0, 1, RSTART-1) ref substr($0, RSTART+RLENGTH)

                      }
                  }
                  # handle relref same page
                  /\(#redisvl\.[^)]+\)/ {
                      while (match($0, /\[[^][]+\]\(#redisvl\.[^)]+\)/)) {
                          
                          m = substr($0, RSTART+1, RLENGTH-2)
                          split(m, parts, /[.#]/)
                          ref = "[" parts[length(parts)] "]" "(" "#" tolower(parts[length(parts)]) ")"
                          $0 = substr($0, 1, RSTART-1) ref substr($0, RSTART+RLENGTH)
                      }
                  }
                  # format class/function signatures
                  /^####?/ {
                      # remove * from class, async, etc.
                      if ($2 ~ "^*") {
                          gsub(/\*/, "", $2)
                      }
                      
                      # insert opening backtick
                      gsub(/^/,"`", $2)

                      if ($0 ~ /#### `.+: .*\[.+\]\(#.+\)/) {
                          # fix relrefs
                          gsub(/^/, "`", $4)
                          gsub(/`$/, "", $4)
                          gsub(/\*$/,"");
                      } else {
                          # insert closing backtick
                          $0 = $0 "`";
                      }
                      # unescape double asterisks, e.g. **kwargs
                      gsub(/\\\*\\\*/,"**");

                      # unespace underscores
                      gsub(/\\_/,"_");

                      # remove asterisks
                      gsub(/ ?\*:/,":");
                      gsub(/\*`$/,"`");

                      # handle ClassVar[ConfigDict]
                      gsub(/\* \*= \{/," = \{")
                      
                      # handle *= in router.md
                      gsub(/ \*\= /, " = ");

                      # format rel links
                      if ($0 ~ /\[.+\]\(.+relref.+\)/) {
                          gsub(/\[/,"`[`")
                          gsub(/\]/,"`]")
                          gsub(/\)/,")` ")
                      }
                      # unescape single asterisks, e.g. *args
                      gsub(/\\\*/,"*");
                  }
                  {
                      # fix parameters
                      gsub(/\*\[\*\*/,"\*\[\* \*");
                      gsub(/\*\(\*\*/,"\*\(\* \*");
                      print $0
                  }
              ' "${api_markdown_page}" > _tmp && mv _tmp "${api_markdown_page}"
          done

          # Format _index.md pages
          cp ./${build_folder}/markdown/api/index.md ./redis_vl_hugo/api/_index.md

          index_markdown_pages=(
              ./redis_vl_hugo/api/_index.md
          )

          # Fetch an upstream MyST landing page from the local clone (already checked out at
          # the requested tag) and convert its grid-card directives into Hugo HTML cards via
          # build/redisvl_grid_to_cards.py. Falls back to copying the post-Sphinx markdown if
          # the upstream source isn't present in this release.
          fetch_landing_source() {
              local rel_path="$1"
              local out_path="$2"
              if [ -f "./redis-vl-python/docs/${rel_path}" ]; then
                  cp "./redis-vl-python/docs/${rel_path}" "${out_path}"
                  return 0
              fi
              return 1
          }

          transform_landing() {
              local rel_path="$1"
              local hugo_dest="$2"
              local context="$3"
              local fallback="$4"
              local tmp_src
              tmp_src=$(mktemp)
              if fetch_landing_source "${rel_path}" "${tmp_src}"; then
                  mkdir -p "$(dirname "${hugo_dest}")"
                  python3 build/redisvl_grid_to_cards.py "${tmp_src}" "${hugo_dest}" --context "${context}"
                  rm -f "${tmp_src}"
                  return 0
              fi
              rm -f "${tmp_src}"
              if [ -n "${fallback}" ] && [ -f "${fallback}" ]; then
                  mkdir -p "$(dirname "${hugo_dest}")"
                  cp "${fallback}" "${hugo_dest}"
                  return 0
              fi
              return 1
          }

          if transform_landing "user_guide/index.md" "./redis_vl_hugo/user_guide/_index.md" "user_guide" "./${build_folder}/markdown/user_guide/index.md"; then
              index_markdown_pages+=(./redis_vl_hugo/user_guide/_index.md)
          fi

          if [ -f "./${build_folder}/markdown/overview/index.md" ]; then
              cp ./${build_folder}/markdown/overview/index.md ./redis_vl_hugo/overview/_index.md
              index_markdown_pages+=(./redis_vl_hugo/overview/_index.md)
          fi

          if [ -d "./redis_vl_hugo/concepts" ]; then
              if transform_landing "concepts/index.md" "./redis_vl_hugo/concepts/_index.md" "concepts" "./${build_folder}/markdown/concepts/index.md"; then
                  index_markdown_pages+=(./redis_vl_hugo/concepts/_index.md)
              fi
          fi

          if transform_landing "user_guide/how_to_guides/index.md" "./redis_vl_hugo/user_guide/how_to_guides/_index.md" "how_to_guides" "./${build_folder}/markdown/user_guide/how_to_guides/index.md"; then
              index_markdown_pages+=(./redis_vl_hugo/user_guide/how_to_guides/_index.md)
          fi

          if transform_landing "user_guide/use_cases/index.md" "./redis_vl_hugo/user_guide/use_cases/_index.md" "use_cases" "./${build_folder}/markdown/user_guide/use_cases/index.md"; then
              index_markdown_pages+=(./redis_vl_hugo/user_guide/use_cases/_index.md)
          fi

          for index_markdown_page in "${index_markdown_pages[@]}"; do
              format "${index_markdown_page}"

              # Fix relrefs by removing .md extension and references to numbered pages (with or without a path prefix)
              sed -E -i 's/\.md/\//g; s/\(([^)]*\/)?([0-9]{2}_)/(\1/g; s/\/index\//\//g' "${index_markdown_page}"
          done

          # Rename user guides to strip leading numbers from filename (top level and how_to_guides)
          user_guides=(./redis_vl_hugo/user_guide/**/*.md)
          for user_guide in "${user_guides[@]}"; do
              if [[ ! "$user_guide" =~ _index.md$ ]]; then
                  renamed_user_guide=$(sed 's|/[0-9]\+_|/|' <<<${user_guide})
                  if [ "${user_guide}" != "${renamed_user_guide}" ]; then
                      mv ${user_guide} ${renamed_user_guide}
                  fi
              fi
          done

          if [ ${isLatest} = true ]; then
            # Remove old files before copying to avoid stale content
            rm -rf content/develop/ai/redisvl/api/*
            rm -rf content/develop/ai/redisvl/user_guide/*
            rm -rf content/develop/ai/redisvl/overview/*
            rm -rf content/develop/ai/redisvl/concepts/*

            cp -r redis_vl_hugo/* content/develop/ai/redisvl/

            # Copy the architecture diagram referenced by the markdown to static/images/redisvl/
            if [ -f "./redis-vl-python/docs/_static/redisvl-architecture.svg" ]; then
                mkdir -p static/images/redisvl/
                cp ./redis-vl-python/docs/_static/redisvl-architecture.svg ./static/images/redisvl/redisvl-architecture.svg
            fi
          else
            mkdir -p content/develop/ai/redisvl/${version}/
            cp -r redis_vl_hugo/* content/develop/ai/redisvl/${version}/
            cp content/develop/ai/redisvl/_index.md content/develop/ai/redisvl/${version}/_index.md
            cp content/develop/ai/redisvl/install.md content/develop/ai/redisvl/${version}/install.md
            python3 build/version_archiver.py redisvl ${version} --skip-archive
          fi

          # Globally replace unicode quotes to ASCII
          find content/develop/ai/redisvl/ -type f -exec sed -i 's/[“”]/"/g' {} \;

      - name: 'Create pull request if necessary'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release="${{ matrix.version }}"
          release="${release#v}"
          branch="redisvl_docs_sync_${release}"
          redisvl_change=false

          # check if remote branch already exists
          git fetch --all
          set +e
          git ls-remote --exit-code --heads origin "refs/heads/${branch}"
          if [ "$?" -eq 0 ]; then
            set -e
            # if it does, create local branch off existing remote branch
            git checkout -f -b "${branch}" "origin/${branch}"
            git branch --set-upstream-to="origin/${branch}" "${branch}"
            git pull
          else
            set -e
            # otherwise, create local branch from main
            git checkout -b "${branch}"
          fi

          set +e
          latest_redisvl_release_is_different=$(git diff content/develop/ai/redisvl/ static/images/redisvl/)
          new_release=$(git ls-files --others --directory | grep -E 'content/develop/ai/redisvl/'${release}'|static/images/redisvl/')

          if [[ -n "$latest_redisvl_release_is_different" || -n "$new_release" ]]; then
            redisvl_change=true

            git add "content/develop/ai/redisvl/"
            git add "static/images/redisvl/"
            git config user.email "177626021+redisdocsapp[bot]@users.noreply.github.com"
            git config user.name "redisdocsapp[bot]"
            git commit -m "Update for redisvl ${release}"
          fi

          if [ "$redisvl_change" = true ] ; then
            git push origin "${branch}"

            # If a pr is not already open, create one
            set +e
            gh search prs -R redis/docs --state open --match title "update for redisvl ${release}" | grep -q "update for redisvl ${release}"
            if [ "$?" -eq 1 ]; then
              set -e
              gh pr create \
                --body "update for redisvl ${release}" \
                --title "update for redisvl ${release}" \
                --head "$branch" \
                --base "main"
            fi
          fi
